name: Expo Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-typecheck:
    name: Lint and typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: expo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint
